version: "3.9"

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - chromadb
    volumes:
      - ./data:/app/data

volumes:
  chroma_data: